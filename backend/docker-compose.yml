version: "3.9"
services:
  db:
    image: postgres:16
    container_name: asha_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: asha_triage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: asha_backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: sh -c "npx prisma migrate deploy && npm run start"

volumes:
  pgdata:
